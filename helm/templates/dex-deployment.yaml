# BlackBoard/helm/templates/dex-deployment.yaml
# Dex OIDC identity provider -- reverse-proxied by Brain at /dex/*
# Reference: release-console Dex deployment + Kargo Helm chart
{{- if .Values.dex.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-dex
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: dex
  annotations:
    serviceaccounts.openshift.io/oauth-redirecturi.darwin: >-
      https://{{ required "route.host is required when dex.enabled=true" .Values.route.host }}/dex/callback
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-dex-token
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: dex
  annotations:
    kubernetes.io/service-account.name: {{ .Release.Name }}-dex
type: kubernetes.io/service-account-token
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-dex-config
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: dex
type: Opaque
stringData:
  config.yaml: |
    issuer: https://{{ .Values.route.host }}/dex

    storage:
      type: memory

    web:
      https: 0.0.0.0:5556
      tlsCert: /etc/dex/cert/tls.crt
      tlsKey: /etc/dex/cert/tls.key

    telemetry:
      http: 0.0.0.0:5558

    expiry:
      idTokens: {{ .Values.dex.expiry.idTokens | quote }}
      refreshTokens:
        validIfNotUsedFor: {{ .Values.dex.expiry.refreshTokens.validIfNotUsedFor | quote }}

    oauth2:
      skipApprovalScreen: true

    staticClients:
    - id: {{ .Values.dex.clientId | quote }}
      name: Darwin Dashboard
      public: true
      redirectURIs:
        - https://{{ .Values.route.host }}
        - https://{{ .Values.route.host }}/callback

    {{- if .Values.dex.connectors }}
    connectors:
    {{- toYaml .Values.dex.connectors | nindent 4 }}
    {{- else }}
    connectors: []
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-dex
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: dex
spec:
  revisionHistoryLimit: 2
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}
      app.kubernetes.io/component: dex
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}
        app.kubernetes.io/component: dex
    spec:
      serviceAccountName: {{ .Release.Name }}-dex
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: dex
          image: {{ .Values.dex.image.repository }}:{{ .Values.dex.image.tag }}
          imagePullPolicy: {{ .Values.dex.image.pullPolicy }}
          command: ["dex", "serve"]
          args: ["/etc/dex/config.yaml"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-dex-token
                  key: token
            {{- with .Values.dex.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.dex.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: https
              containerPort: 5556
              protocol: TCP
            - name: telemetry
              containerPort: 5558
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: telemetry
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: telemetry
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dex.resources | nindent 12 }}
          volumeMounts:
            - name: dex-config
              mountPath: /etc/dex
            - name: dex-tls
              mountPath: /etc/dex/cert
            {{- with .Values.dex.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: dex-config
          secret:
            secretName: {{ .Release.Name }}-dex-config
        - name: dex-tls
          secret:
            secretName: {{ .Values.dex.tls.secretName }}
        {{- with .Values.dex.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-dex
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: dex
spec:
  ports:
    - name: https
      port: 5556
      targetPort: 5556
      protocol: TCP
    - name: telemetry
      port: 5558
      targetPort: 5558
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}
    app.kubernetes.io/component: dex
{{- end }}
