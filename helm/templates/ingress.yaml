# BlackBoard/helm/templates/ingress.yaml
# @ai-rules:
# 1. [Constraint]: Gated by ingress.enabled (default off). Route is the OpenShift default.
# 2. [Gotcha]: WebSocket endpoints /ws and /agent/ws need proxy-read-timeout >= 3600s. Default annotations set this for NGINX.
# 3. [Pattern]: Mirrors standard helm-chart Ingress template. Labels must match deployment.yaml.
# 4. [Constraint]: service.port is shared with route.yaml and service.yaml -- single source of truth in values.yaml.
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels:
    app: darwin-brain
    app.kubernetes.io/name: darwin-brain
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Release.Name }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
