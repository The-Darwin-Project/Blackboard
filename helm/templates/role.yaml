{{- if .Values.ephemeralAgents.enabled }}
---
# Role for ephemeral agent lifecycle -- EventListener needs full Tekton Triggers access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-ephemeral-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: darwin-brain
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ephemeral-agent
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "triggerbindings", "triggertemplates", "triggers", "interceptors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]
---
# ClusterRole for EventListener to watch ClusterInterceptors (cluster-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-ephemeral-agent-cluster
  labels:
    app: darwin-brain
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ephemeral-agent
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["clusterinterceptors"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-ephemeral-agent
  namespace: {{ .Release.Namespace }}
  labels:
    app: darwin-brain
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ephemeral-agent
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-brain
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-ephemeral-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-ephemeral-agent-cluster
  labels:
    app: darwin-brain
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: ephemeral-agent
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-brain
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-ephemeral-agent-cluster
  apiGroup: rbac.authorization.k8s.io
{{- end }}
