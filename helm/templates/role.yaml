# BlackBoard/helm/templates/role.yaml
# Role for reading pod metrics + K8s resources in the darwin namespace
{{- if .Values.observer.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-metrics-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
rules:
  # Core resources -- read-only investigation
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "endpoints", "configmaps", "secrets", "serviceaccounts", "namespaces"]
    verbs: ["get", "list", "watch"]
  # Apps -- deployments, replicasets, statefulsets, daemonsets
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  # Autoscaling -- HPA
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list"]
  # Networking -- ingresses, network policies
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses", "networkpolicies"]
    verbs: ["get", "list"]
  # OpenShift routes
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
  # Pod metrics from metrics-server
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# ClusterRole for cross-namespace read access: ArgoCD, Tekton, Kargo, core K8s
# Grants the SysAdmin agent kubectl access to PipelineRuns, Stages, etc. across all namespaces.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-cluster-reader
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
rules:
  # ArgoCD Applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["get", "list", "watch"]
  # Tekton pipeline resources (read-only)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines", "pipelineruns", "tasks", "taskruns", "pipelineresources"]
    verbs: ["get", "list", "watch"]
  # Kargo resources (read-only)
  - apiGroups: ["kargo.akuity.io"]
    resources: ["projects", "stages", "promotions", "freight", "warehouses"]
    verbs: ["get", "list", "watch"]
  # Core resources across namespaces (investigation + pod delete for remediation)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  # Apps across namespaces
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Node metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-cluster-reader
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-brain
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-cluster-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- if .Values.slackAccess.enabled }}
---
# Minimal ClusterRole for Slack access gate -- OCP Group membership lookup only
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-slack-gate-reader
  labels:
    {{- include "darwin.slackGateLabels" . | nindent 4 }}
rules:
  - apiGroups: ["user.openshift.io"]
    resources: ["groups"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-slack-gate-reader
  labels:
    {{- include "darwin.slackGateLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-brain
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-slack-gate-reader
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- if .Values.ephemeralAgents.enabled }}
---
# Role for ephemeral agent lifecycle -- EventListener needs full Tekton Triggers access
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-ephemeral-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "darwin.ephemeralLabels" . | nindent 4 }}
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["taskruns"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["eventlisteners", "triggerbindings", "triggertemplates", "triggers", "interceptors"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
# ClusterRole for EventListener to watch ClusterInterceptors (cluster-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-ephemeral-agent-cluster
  labels:
    {{- include "darwin.ephemeralLabels" . | nindent 4 }}
rules:
  - apiGroups: ["triggers.tekton.dev"]
    resources: ["clusterinterceptors"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-ephemeral-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "darwin.ephemeralLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-brain
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: {{ .Release.Name }}-ephemeral-agent
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-ephemeral-agent-cluster
  labels:
    {{- include "darwin.ephemeralLabels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-brain
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-ephemeral-agent-cluster
  apiGroup: rbac.authorization.k8s.io
{{- end }}
