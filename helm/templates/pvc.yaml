# BlackBoard/helm/templates/pvc.yaml
{{- if and .Values.redis.enabled .Values.redis.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-redis-data
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  accessModes:
    - ReadWriteMany
  {{- if .Values.redis.persistence.storageClassName }}
  storageClassName: {{ .Values.redis.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.redis.persistence.size }}
{{- end }}
{{- if .Values.sidecars.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-gitops-data
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
    app.kubernetes.io/component: gitops
spec:
  accessModes:
{{ toYaml .Values.sidecars.persistence.accessModes | indent 4 }}
  {{- if .Values.sidecars.persistence.storageClassName }}
  storageClassName: {{ .Values.sidecars.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.sidecars.persistence.size }}
{{- end }}
{{- if and .Values.qdrant.enabled .Values.qdrant.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-qdrant-data
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
    app.kubernetes.io/component: qdrant
spec:
  accessModes:
    - {{ .Values.qdrant.persistence.accessMode | default "ReadWriteOnce" }}
  {{- if .Values.qdrant.persistence.storageClassName }}
  storageClassName: {{ .Values.qdrant.persistence.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.qdrant.persistence.size }}
{{- end }}
