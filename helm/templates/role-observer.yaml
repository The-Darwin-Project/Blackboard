# Defense-in-depth: namespace-scoped Role mirrors the ClusterRole (cluster-reader)
# so the observer keeps working if the ClusterRole is ever removed.
# Keep rules in sync with helm/templates/role.yaml cluster-reader.
{{- if and .Values.observer.enabled .Values.observer.namespaces }}
{{- range .Values.observer.namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: darwin-observer
  namespace: {{ . }}
  labels:
    app.kubernetes.io/name: darwin-blackboard
    app.kubernetes.io/component: observer
rules:
  # ArgoCD Applications
  - apiGroups: ["argoproj.io"]
    resources: ["applications", "applicationsets"]
    verbs: ["get", "list", "watch"]
  # Tekton pipeline resources (read-only)
  - apiGroups: ["tekton.dev"]
    resources: ["pipelines", "pipelineruns", "tasks", "taskruns", "pipelineresources"]
    verbs: ["get", "list", "watch"]
  # Kargo resources (read-only)
  - apiGroups: ["kargo.akuity.io"]
    resources: ["projects", "stages", "promotions", "freight", "warehouses"]
    verbs: ["get", "list", "watch"]
  # Core resources (read-only investigation)
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "namespaces", "configmaps"]
    verbs: ["get", "list", "watch"]
  # Apps
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  # Pod and node metrics
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: darwin-observer
  namespace: {{ . }}
  labels:
    app.kubernetes.io/name: darwin-blackboard
    app.kubernetes.io/component: observer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: darwin-observer
subjects:
  - kind: ServiceAccount
    name: {{ $.Release.Name }}-brain
    namespace: {{ $.Release.Namespace }}
{{- end }}
{{- end }}
