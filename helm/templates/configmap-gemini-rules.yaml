# BlackBoard/helm/templates/configmap-gemini-rules.yaml
# Agent rules for each sidecar (GEMINI.md or CLAUDE.md) - mounted via subPath
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-gemini-rules
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
data:
  architect.md: |
{{ .Files.Get "files/architect.md" | indent 4 }}
  sysadmin.md: |
{{ .Files.Get "files/sysadmin.md" | indent 4 }}
  developer.md: |
{{ .Files.Get "files/developer.md" | indent 4 }}
  qe.md: |
{{ .Files.Get "files/qe.md" | indent 4 }}
  security_analyst.md: |
{{ .Files.Get "files/security_analyst.md" | indent 4 }}
