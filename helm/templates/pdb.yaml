# BlackBoard/helm/templates/pdb.yaml
# @ai-rules:
# 1. [Constraint]: Must match deployment.yaml selector labels exactly.
# 2. [Pattern]: minAvailable: 1 on a single-replica stateful pod blocks voluntary eviction entirely.
# 3. [Gotcha]: Descheduler respects PDBs. Without this, LowNodeUtilization evicts darwin pods.
# 4. [Pattern]: One PDB per deployment (brain, qdrant, dex). Blanket namespace coverage.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-brain
  labels:
    {{- include "darwin.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "darwin.selectorLabels" . | nindent 6 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-qdrant
  labels:
    app: darwin-qdrant
    app.kubernetes.io/name: darwin-qdrant
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: darwin-qdrant
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-dex
  labels:
    app: darwin-dex
    app.kubernetes.io/name: darwin-dex
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: darwin-dex
