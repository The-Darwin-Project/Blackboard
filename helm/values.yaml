# BlackBoard/helm/values.yaml
# Darwin Blackboard (Brain) Helm values

# =============================================================================
# Global Settings
# =============================================================================
global:
  namespace: "" # If non-empty, chart creates the Namespace with Tekton pruner labels
# =============================================================================
# Brain Container Configuration
# =============================================================================
image:
  repository: ghcr.io/the-darwin-project/blackboard
  tag: "e863967" # Updated by CI to commit SHA
  pullPolicy: IfNotPresent
replicaCount: 1
# =============================================================================
# Redis Sidecar Configuration
# =============================================================================
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
  password: "" # Override via secret or ArgoCD app parameters
  persistence:
    enabled: true # Enables RDB snapshots to PVC -- survives pod restarts
    storageClassName: "" # Override via ArgoCD app parameters
    size: 8Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 6Gi
      cpu: 6
# =============================================================================
# Qdrant Vector DB (Deep Memory) -- standalone Deployment + Service
# =============================================================================
qdrant:
  enabled: true
  image:
    repository: ghcr.io/qdrant/qdrant/qdrant
    tag: "v1.16.3-unprivileged" # Non-root image for OpenShift SCC
  persistence:
    enabled: true
    storageClassName: "" # Override via ArgoCD app parameters (use block storage, NOT CephFS -- Qdrant WAL needs flock)
    accessMode: ReadWriteOnce
    size: 10Gi
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 8Gi
      cpu: "2"
  port: 6333 # HTTP API
  grpcPort: 6334 # gRPC API
# =============================================================================
# Agent Sidecars Configuration (same base image, per-agent CLI type and rules)
# =============================================================================
sidecars:
  architect:
    enabled: true
    port: 9091
    cliType: "claude" # "gemini" or "claude"
    gitUserName: "Darwin Architect"
    gitUserEmail: "darwin-architect@darwin-project.io"
    modelName: "claude-opus-4-6[1m]" # Claude Opus 4.6 via Vertex AI + 1M context window
    effortLevel: "high" # Claude Code effort: low|medium|high|max (deep planning needs high)
    permissionMode: "bypassPermissions" # No hard restriction -- soft rules via architect.md + skills
    gcpSecret: "" # Per-agent GCP SA secret (falls back to gcp.agentExistingSecret, then gcp.existingSecret)
  sysadmin:
    enabled: true
    port: 9092
    cliType: "claude" # "gemini" or "claude"
    gitUserName: "Darwin SysAdmin"
    gitUserEmail: "darwin-sysadmin@darwin-project.io"
    modelName: "claude-sonnet-4-6" # Claude Sonnet 4.6 via Vertex AI
    effortLevel: "medium" # Execution tasks are well-scoped; higher effort rarely helps
    permissionMode: "bypassPermissions" # Full access (implements plans)
    gcpSecret: "" # Per-agent GCP SA secret (falls back to gcp.agentExistingSecret, then gcp.existingSecret)
  developer:
    enabled: true
    port: 9093
    cliType: "claude" # Claude Code for code generation
    gitUserName: "Darwin Developer"
    gitUserEmail: "darwin-developer@darwin-project.io"
    modelName: "claude-opus-4-6[1m]" # Claude Opus 4.6 via Vertex AI + 1M context window
    effortLevel: "low" # Developer follows Architect's plan -- low effort is sufficient for execution
    permissionMode: "bypassPermissions" # Skip permission prompts for autonomous code changes
    gcpSecret: "" # Per-agent GCP SA secret (falls back to gcp.agentExistingSecret, then gcp.existingSecret)
  qe:
    enabled: true
    port: 9094
    cliType: "claude"
    gitUserName: "Darwin QE"
    gitUserEmail: "darwin-qe@darwin-project.io"
    modelName: "claude-sonnet-4-6"
    effortLevel: "high" # QE needs deep reasoning to find edge cases and write thorough tests
    permissionMode: "bypassPermissions"
    gcpSecret: ""
  # Shared image for all sidecars
  image:
    repository: ghcr.io/the-darwin-project/gemini-sidecar
    tag: "cbd1e41" # Reverted: 0c17603 sidecars crashing
  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 6Gi
      cpu: "6"
  # Shared persistent storage for agent working directories (git clones)
  persistence:
    enabled: true
    storageClassName: "" # Override via ArgoCD app parameters
    size: 5Gi
    accessModes:
      - ReadWriteMany
# =============================================================================
# GCP / Vertex AI Configuration
# =============================================================================
gcp:
  project: "" # Required: GCP project ID (set via --set or override file)
  location: "global"
  provider: "gemini" # Brain LLM provider: "gemini" or "claude" (controls Brain adapter)
  # Per-component LLM configuration
  llm:
    brain:
      model: "gemini-3.1-pro-preview-customtools" # If provider=claude, set to "claude-opus-4-6"
      temperature: "0.8"
      maxOutputTokens: "65000"
    aligner:
      model: "gemini-3.5-flash"
      temperature: "0.3"
      thinkingLevel: "high"
      maxOutputTokens: "10000"
    archivist:
      model: "gemini-3.5-flash" # Event summarization for deep memory
      temperature: "0.4"
      thinkingLevel: "high"
      maxOutputTokens: "32000"
    lessonExtractor:
      model: "claude-sonnet-4-6" # Claude via Vertex AI for lesson extraction from documents
    headhunter:
      model: "gemini-3.5-flash" # MR triage and plan generation
      temperature: "0.3"
      thinkingLevel: "low"
    timekeeper:
      model: "gemini-3.5-flash" # Instruction refinement (user-facing, fast)
      temperature: "0.3"
      maxOutputTokens: "2048"
    nightwatcher:
      model: "gemini-3.5-flash" # Shift consolidation (high thinking for clustering)
      temperature: "0.5"
      thinkingLevel: "high"
      maxOutputTokens: "8192"
  tpmLimit: "500000" # Vertex AI tokens-per-minute quota (Tier 1 default). Shared across Brain, Aligner, Headhunter, Archivist.
  # Service account JSON secrets (pre-created K8s Secrets)
  # Brain SA -- for Brain orchestrator Vertex AI calls
  existingSecret: "" # e.g., "gcp-sa-key"
  # Agent SA -- shared SA for agent sidecars (avoids sharing 429 quota with Brain)
  # Each sidecar can override with its own sidecars.<role>.gcpSecret for per-agent quota isolation
  agentExistingSecret: "" # e.g., "gcp-agent-key"
# =============================================================================
# Service Configuration
# =============================================================================
service:
  type: ClusterIP
  port: 8000
# =============================================================================
# Route Configuration (OpenShift)
# =============================================================================
route:
  enabled: true
  # host: darwin-brain.apps.example.com  # Leave empty for auto-generated
  annotations:
    haproxy.router.openshift.io/timeout: 300s
    haproxy.router.openshift.io/timeout-tunnel: 3600s
  tls:
    enabled: true
    termination: edge # edge, passthrough, or reencrypt
    insecureEdgeTerminationPolicy: Redirect # Allow, Redirect, or None
# =============================================================================
# Ingress Configuration (vanilla Kubernetes -- alternative to OpenShift Route)
# =============================================================================
ingress:
  enabled: false
  className: ""
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []
# =============================================================================
# Application Metadata
# =============================================================================
app:
  name: "darwin-brain"
  version: "1.0.0"
  debug: false
  progressiveSkills: true # Progressive skill loading (phase-specific system prompts)
  # Agent dispatch settings (Brain-level, not sidecar-level)
  dryRun: false # Set to true for testing (no real changes)
  autoApprove: true # Enable closed-loop automation (values-only changes auto-approved)
  gitRepoPath: "/data/gitops"
  contactEmail: "" # Contact email for AI transparency footer, overridable per cluster
  feedbackFormUrl: "" # Google Form URL for detailed feedback (empty = hide link)
  agentWsMode: "reverse" # "legacy" or "reverse" -- gates dispatch path (rollback: set to "legacy")
  agentWsPath: "/agent/ws" # WebSocket endpoint path for agent connections
  maxConcurrentDispatches: 0 # Global WIP cap for local sidecar dispatches: 0=disabled, N=max concurrent. Does NOT affect ephemeral agents (separate {SOURCE}_MAX_ACTIVE caps).
# =============================================================================
# Skill Reconciler Sidecar (Git-to-Redis hot-reload for brain skills)
# =============================================================================
skillReconciler:
  enabled: false
  image: "" # empty = use brain image
  pollInterval: "60"
  gitProvider: "github"
  repo: ""
  branch: "main"
  skillsPath: "src/agents/brain_skills"
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
# =============================================================================
# Brain Scheduling (ReconcileScheduler)
# =============================================================================
brain:
  reconcileWorkers: 0 # 0 = auto-derive from source caps * 1.3. N = fixed worker count.
# =============================================================================
# GitHub App Configuration (for GitOps authentication)
# =============================================================================
github:
  # Pre-created secret containing:
  # - app-id: GitHub App ID
  # - installation-id: GitHub App Installation ID
  # - <name>.pem: Private key file
  existingSecret: "" # e.g., "darwin-github-app"
  # Branch to use (for reference, sidecar defaults to main)
  branch: "main"
# =============================================================================
# GitLab Token Configuration (for GitLab GitOps authentication)
# =============================================================================
gitlab:
  enabled: false
  # Pre-created secret with keys: token, host
  # - token: GitLab Service Account / Group Access Token (PAT)
  #   Required scopes: api, read_repository, write_repository
  # - host: GitLab instance hostname (e.g., gitlab.example.com)
  existingSecret: "" # e.g., "darwin-gitlab-token"
# =============================================================================
# ArgoCD CLI Credentials (for agent ArgoCD API access)
# =============================================================================
argocd:
  enabled: false
  # Pre-created secret with keys: server, auth-token
  existingSecret: "" # e.g., "darwin-argocd-creds"
  # Server URL (e.g., argocd-server.argocd-ns.svc.cluster.local:443)
  server: ""
  # Set to true if using self-signed certs
  insecure: true
# =============================================================================
# Kargo CLI Credentials (for agent Kargo pipeline access)
# =============================================================================
kargo:
  enabled: false
  # Pre-created secret with keys: server, auth-token
  existingSecret: "" # e.g., "darwin-kargo-creds"
  # Server URL (e.g., kargo-api.kargo-ns.svc.cluster.local:443)
  server: ""
  insecure: true
# =============================================================================
# Container Registry Credentials (for agent runtime access to private registries)
# Mounts a kubernetes.io/dockerconfigjson Secret at /secrets/registry/.dockerconfigjson
# and copies to $HOME/.docker/config.json so skopeo/podman can pull at task time.
# This is NOT imagePullSecrets (kubelet-only) -- this is runtime auth for agent CLI tools.
# =============================================================================
registry:
  enabled: false
  existingSecret: "" # e.g., "darwin-registry-pull"
# =============================================================================
# Remote Kubernetes Clusters (read-only MCP access for agents)
# Each entry mounts a kubeconfig Secret and registers a K8s MCP server.
# Agents see each cluster as a separate MCP tool namespace (K8s_<name>).
# If kubearchiveUrl is set, also registers KubeArchive_<name> MCP for archived data.
# Secret must contain a key named "kubeconfig" with a valid kubeconfig file.
# =============================================================================
remoteClusters: {}
# konflux:
#   enabled: true
#   displayName: "Konflux Build Cluster"
#   existingSecret: "darwin-konflux-kubeconfig"  # Secret with key "kubeconfig"
#   secretKey: "kubeconfig"                       # Override if key name differs
#   # Multi-tenant: agents can't namespaces_list -- list accessible namespaces here
#   kubearchiveUrl: ""  # KubeArchive API URL (archived PipelineRuns/TaskRuns/logs)
#   namespacePattern: "v{major}-{minor}-openshift-virtualization-tenant"
#   namespaces:
#     - "v4-18-openshift-virtualization-tenant"
#     - "v4-19-openshift-virtualization-tenant"
#     - "v4-20-openshift-virtualization-tenant"
#     - "v4-21-openshift-virtualization-tenant"
#     - "v4-22-openshift-virtualization-tenant"
# =============================================================================
# Resource Limits (Brain container -- singleton, handles event loop + LLM calls)
# =============================================================================
resources:
  requests:
    memory: 1Gi
    cpu: 400m
  limits:
    memory: 6Gi
    cpu: "6"
# =============================================================================
# Security Context (OpenShift compatible)
# =============================================================================
podSecurityContext:
  fsGroup: 1001
securityContext:
  runAsNonRoot: true
  # OpenShift assigns arbitrary UID from namespace range
  # Do NOT set runAsUser - let OpenShift assign it
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # App needs /tmp
  capabilities:
    drop:
      - ALL
# =============================================================================
# Probes
# =============================================================================
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 20
  periodSeconds: 30
  failureThreshold: 5
readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 5
# =============================================================================
# Kubernetes Observer Configuration
# =============================================================================
observer:
  enabled: true # Enable K8s metrics observer
  namespaces:
    - darwin
  interval: 30 # Poll interval in seconds
  labelSelector: "" # Optional: filter pods by label (e.g., "app=darwin-store")
# =============================================================================
# Aligner Anomaly Thresholds
# =============================================================================
aligner:
  maxActive: "2" # max concurrent ephemeral agents for aligner-sourced events (kargo_stage)
  thresholds:
    cpu: "80.0" # CPU % above which Flash analyzes the service
    memory: "85.0" # Memory % above which Flash analyzes the service
    errorRate: "5.0" # Error rate % above which Flash analyzes the service
# =============================================================================
# Kargo Stage Observer (promotion failure detection via K8s Watch)
# =============================================================================
kargoObserver:
  enabled: false # Set to true when kargo.akuity.io CRDs are installed
# =============================================================================
# Slack Integration (Socket Mode, bidirectional event mirroring)
# =============================================================================
slack:
  enabled: false
  existingSecret: "" # e.g., "slack-credentials" (keys: bot-token, app-token)
  channels:
    infrastructure: "" # Channel ID for #darwin-infra (e.g., "C0XXXXXXX")
    mrFallback: "" # Channel ID for MR notifications (e.g., "C0YYYYYYY")
  workspaceDomain: "" # Slack workspace domain for permalink URLs (e.g., "myteam.slack.com"). Defaults to "app.slack.com/client"
  userMapping:
    method: "email" # "email" (auto-lookup via Slack API) or "static"
# =============================================================================
# Slack Access Gate (OCP Group-based user authorization)
# =============================================================================
slackAccess:
  enabled: false
  groups: "" # CSV of OCP group names -- set in GitOps overlay
  emailDomain: "" # Domain suffix for username->email mapping -- set in GitOps overlay
  syncIntervalSeconds: 300
  existingSecret: "" # K8s Secret with key "maintainer-emails" -- set in GitOps overlay
# =============================================================================
# Ephemeral Agents (On-Call via Tekton TaskRun)
# =============================================================================
ephemeralAgents:
  enabled: true # Set to true when Tekton Triggers CRDs are installed
  idleTimeoutMs: "3600000" # 1h -- agent self-terminates after no tasks
  taskRunTimeout: "24h0m0s" # Hard ceiling. Must exceed idleTimeoutMs.
  cli: "claude" # CLI binary for ephemeral agents
  model: "claude-opus-4-6[1m]" # Single model for all role switches + 1M context window
  effortLevel: "high" # On-call investigations benefit from deep reasoning
  permissionMode: "bypassPermissions"
  # Node exclusion list -- skip broken nodes for ephemeral agent scheduling.
  # Managed via ArgoCD app params. SysAdmin can add nodes here when investigating issues.
  pruneImage: "alpine/k8s:latest" # Lightweight kubectl image for TaskRun cleanup
  excludeNodes: []
  #  - hostname-to-exclude
  cleanup:
    strategy: "keep" # "keep-since" (age-based) or "keep" (count-based)
    keepSince: 1440 # Minutes to retain completed TaskRuns (1440 = 24h)
    keep: 5 # Number of TaskRuns to retain (when strategy=keep)
    schedule: "0 */6 * * *" # Cron schedule for the Tekton Operator pruner
  # MMC overflow: when local sidecars are full (role-locked, 1 per role = MM1),
  # scale C with ephemeral agents (shape-shifting, any role per event).
  # Set per-source limits to enable overflow. 0 = disabled, no overflow for that source.
  # IMPORTANT: maxConcurrentDispatches (WIP cap) fires BEFORE overflow in the dispatch
  # pipeline. When using overflow, keep maxConcurrentDispatches at 0 (disabled, recommended)
  # or set it to local_sidecars + overflow_cap (e.g., 4 + 2 = 6). Setting it to the local
  # sidecar count (4) defeats overflow -- events defer at the WIP gate before reaching overflow.
  overflow:
    chat: 1 # Max ephemeral agents for chat overflow (0 = disabled)
    slack: 1 # Max ephemeral agents for slack overflow (0 = disabled)
# =============================================================================
# Headhunter (GitLab Todo Poller)
# =============================================================================
headhunter:
  enabled: false # Set to true + configure GITLAB_HOST to activate
  pollInterval: "300" # seconds between poll cycles
  maxActive: "3" # max concurrent headhunter events (flow gate)
  startupDelay: "180" # seconds to wait for sidecars before first poll (pod takes 2-3 min)
  maintainerSource: "static" # "static" (env var CSV) or "smartsheet" (API)
  maintainers: "" # CSV of maintainer emails for static source
# =============================================================================
# Jira Integration (QE Mission Polling -- Headhunter Jira Head)
# =============================================================================
jira:
  enabled: false
  existingSecret: "" # e.g., "darwin-jira-creds" (keys: email, api-token, bot-account-id)
  url: ""
  label: "darwin"
  maxActive: 1 # Independent WIP limit for Jira events (separate from GitLab headhunter)
  model: "claude-sonnet-4-6"
  skills: {} # label -> git raw URL map (e.g., qe_testing: "https://gitlab.../business-analyst.mdc")
# =============================================================================
# Smartsheet Integration (Incident Tracking)
# =============================================================================
smartsheet:
  incident:
    enabled: false
    existingSecret: "" # e.g., "darwin-smartsheet-incident" (key: api-token)
    sheetId: "" # Incident report sheet ID
    reporter: "" # Jira-valid email for incident reporter (e.g., team DL)
    reporterName: "" # Must match Jira display name for the reporter email
    labels: "" # Comma-separated labels for incidents (multi-picklist column)
    components: "" # Comma-separated components for incidents (multi-picklist column)
    issueType: "" # Issue type for incidents (e.g., "Task", "Bug")
    labelFilter: "" # Label to filter on when reading incidents back (UI list endpoint)
# =============================================================================
# TimeKeeper (Scheduled Task Observer -- requires dex.enabled=true)
# =============================================================================
timekeeper:
  enabled: true # Set to true + dex.enabled to activate
  pollInterval: "30" # seconds between poll cycles
  maxPerUser: "10" # max schedules per authenticated user
  maxTotal: "50" # max schedules system-wide
  chatStaleTtl: "5400" # seconds before auto-closing stale chat/slack approval requests (90 min)
# =============================================================================
# Idle Timeout (auto-close stale chat/slack events after user inactivity)
# =============================================================================
idleTimeout:
  warningSec: "600" # 10 min -- warning message sent to user
  closeSec: "300" # 5 min after warning -- auto-close if no response
  conversationSec: "900" # chat/slack post-response idle timeout (was 3600 before v0.9)
  casualSec: "600" # CASUAL domain idle timeout (shorter for social conversations)
# =============================================================================
# Google Search Grounding (Brain web search during triage/investigate)
# =============================================================================
googleSearch:
  enabled: false # Set to true to enable Google Search grounding in triage/investigate phases
# =============================================================================
# Memory Reflex (real-time lesson search during FRIDAY's thinking stream)
# =============================================================================
memoryReflex:
  enabled: true # Set to true to fire async lesson searches during Brain thinking
  threshold: "0.60" # Minimum similarity score for lesson matches
  maxSearches: "5" # Max embedding searches per processing cycle
# =============================================================================
# Cortex (Cognitive Recall Graph -- meta-cognitive observation layer)
# =============================================================================
cortex:
  pulseTracking: true # Emit pulse events on Qdrant search, tool calls, phase/agent changes
  system2:
    enabled: true # Start Cortex observer (Gemini Live API session)
    shadow: false # true = interventions saved but not delivered to Brain; false = live
    sessionReport: true # Generate session observation report on idle disconnect
    handoffReport: true # Capture session notes on go_away before reconnect
    model: "gemini-live-2.5-flash" # Awaiting GCP admin to re-add to org policy allowlist
# =============================================================================
# Nightwatcher (Shift Consolidation Agent -- requires dex.enabled=true)
# =============================================================================
nightwatcher:
  enabled: false # Set to true to intercept Brain escalations for batch consolidation
  sweepCron: "0 6,18 * * *" # Twice daily: 06:00 UTC (morning) and 18:00 UTC (evening)
  minPending: "1" # Minimum pending escalations to trigger a sweep
  maxActive: "1" # Ephemeral agent concurrency limit for nightwatcher source
  dispatchCap: "3" # Max investigation dispatches per sweep
# =============================================================================
# Dex OIDC Identity Provider (bundled, reverse-proxied via Brain at /dex/*)
# Prerequisites: cert-manager operator installed in cluster
# =============================================================================
dex:
  enabled: false
  image:
    repository: ghcr.io/dexidp/dex
    tag: "v2.44.0"
    pullPolicy: IfNotPresent
  # TLS via cert-manager (self-signed, namespace Issuer)
  tls:
    secretName: "dex-tls"
    issuerName: "darwin-selfsigned-issuer"
  # Static client for Dashboard (public: true = PKCE, no client secret)
  clientId: "darwin-dashboard"
  # Connector configuration (maps directly to Dex connectors: block)
  # OpenShift OAuth example:
  #   connectors:
  #     - type: openshift
  #       id: openshift
  #       name: OpenShift
  #       config:
  #         clientID: system:serviceaccount:<namespace>:<release>-dex
  #         clientSecret: $CLIENT_SECRET
  #         issuer: https://kubernetes.default.svc
  #         redirectURI: https://<brain-route-host>/dex/callback
  #         insecureCA: true
  connectors: []
  # Token expiry configuration
  expiry:
    idTokens: "24h"
    refreshTokens:
      validIfNotUsedFor: "72h"
  # Optional: override the default AI disclaimer on the login page (empty = use built-in default)
  loginDisclaimer: ""
  # Env/volume injection for connector secrets (Kargo pattern)
  env: []
  envFrom: []
  volumes: []
  volumeMounts: []
  resources:
    requests:
      memory: 64Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 500m
# =============================================================================
# Node Selection (optional)
# =============================================================================
nodeSelector: {}
tolerations: []
affinity: {}
