# .github/workflows/ai-review.yaml
# AI Code Review workflow — runs gitops-ci-reviewer container on PRs.
# Required secrets: VERTEX_SA_JSON (base64-encoded: `cat sa.json | jq -c '.' | base64 -w0`)
# Required variables: GOOGLE_CLOUD_PROJECT

name: AI Code Review

on:
  pull_request:
    branches: [main, master]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    # Only run on internal PRs (fork PRs don't have secrets)
    if: github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 20

    permissions:
      contents: read
      pull-requests: write

    container:
      image: quay.io/redhat-user-workloads/ocp-virt-images-tenant/gitops-ci-reviewer:latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.email "ai-reviewer@github.com"
          git config --global user.name "AI Code Reviewer"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Decode Vertex AI credentials
        env:
          VERTEX_SA_JSON: ${{ secrets.VERTEX_SA_JSON }}
        run: |
          echo "$VERTEX_SA_JSON" | base64 -d > /tmp/vertex-sa.json
          chmod 600 /tmp/vertex-sa.json
          # Validate decoded JSON
          if ! python3 -c "import json; json.load(open('/tmp/vertex-sa.json'))" 2>/dev/null; then
            echo "::error::VERTEX_SA_JSON decode failed — check secret encoding"
            exit 1
          fi

      - name: Run AI review
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLAUDE_CODE_USE_VERTEX: "1"
          GOOGLE_CLOUD_PROJECT: ${{ vars.GOOGLE_CLOUD_PROJECT }}
          GOOGLE_CLOUD_REGION: ${{ vars.GOOGLE_CLOUD_REGION || 'us-central1' }}
          GOOGLE_APPLICATION_CREDENTIALS: "/tmp/vertex-sa.json"
          CI_MERGE_REQUEST_TARGET_BRANCH_NAME: ${{ github.base_ref }}
          CI_MERGE_REQUEST_SOURCE_BRANCH_NAME: ${{ github.head_ref }}
          CI_MERGE_REQUEST_IID: ${{ github.event.pull_request.number }}
          CI_PROJECT_DIR: ${{ github.workspace }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          AI_REVIEW_MODEL: ${{ vars.AI_REVIEW_MODEL || 'claude-sonnet-4-6' }}
          AI_REVIEW_EFFORT: ${{ vars.AI_REVIEW_EFFORT || 'medium' }}
          AI_REVIEW_MAX_TURNS: ${{ vars.AI_REVIEW_MAX_TURNS || '15' }}
          AI_REVIEW_MAX_BUDGET: ${{ vars.AI_REVIEW_MAX_BUDGET || '3.50' }}
          AI_REVIEW_MAX_DIFF_LINES: ${{ vars.AI_REVIEW_MAX_DIFF_LINES || '5000' }}
        run: node /app/entrypoint/dist/index.js

      - name: Post failure notice
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::warning::AI review failed — check workflow logs. PR is not blocked."

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-results
          path: ci-results/
          retention-days: 7
          if-no-files-found: ignore
