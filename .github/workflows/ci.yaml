# BlackBoard/.github/workflows/ci.yaml
# @ai-rules:
# 1. [Constraint]: Validation only -- NO push, NO deploy, NO git commits. Read-only.
# 2. [Pattern]: Runs on every PR and push to main. All jobs must pass before merge.
# 3. [Constraint]: Python tests use requirements-dev.txt (includes prod deps via -r).
# 4. [Pattern]: Jobs run in parallel for fast feedback. Each job is independent.
# PR validation: lint, test, build verification

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest tests/ -v

  ui-build:
    name: UI Build + Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ui

      - name: Lint
        run: npm run lint
        working-directory: ui
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: ui

  helm-validate:
    name: Helm Lint + Template
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint
        run: helm lint helm/

      - name: Template (default values)
        run: helm template darwin-brain helm/
